[www]

user = www-data
group = www-data

; PERBAIKAN: Gunakan 0.0.0.0 agar PHP-FPM mendengarkan koneksi dari semua network interface dalam container ini.
; Ini akan memungkinkan container Nginx menghubungi port 9000 di container ini.
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 40
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 800
request_terminate_timeout = 0